<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','PingFang SC',sans-serif; background:#f5f7fa; color:#333; }

.header { background:linear-gradient(135deg,#1a3a5c,#2d6a9f); color:#fff; padding:24px 40px; }
.header h1 { font-size:22px; margin-bottom:6px; }
.header p { font-size:13px; color:#b8d4e8; }

.container { max-width:1400px; margin:0 auto; padding:20px; }

/* --- Tabs --- */
.tabs { display:flex; gap:8px; margin-bottom:20px; }
.tab { padding:10px 20px; border-radius:8px 8px 0 0; background:#e0e7ef; cursor:pointer; font-size:14px; font-weight:600; transition:all .2s; }
.tab.active { background:#2d6a9f; color:#fff; }
.tab:hover { background:#2d6a9f; color:#fff; }

.panel { display:none; }
.panel.active { display:block; }

/* --- Tag Overview --- */
.category-section { margin-bottom:24px; }
.category-title { font-size:16px; font-weight:700; padding:8px 16px; color:#fff; border-radius:6px; margin-bottom:12px; }
.tag-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.tag-card { background:#fff; border-radius:8px; padding:14px 16px; border:1px solid #dde3ea; cursor:pointer; transition:all .2s; }
.tag-card:hover { border-color:#2d6a9f; box-shadow:0 2px 8px rgba(45,106,159,.15); transform:translateY(-2px); }
.tag-card.highlight { border-color:#e74c3c; box-shadow:0 2px 12px rgba(231,76,60,.2); }
.tag-card.desc-tag { background:#f5f5f5; border-color:#ddd; }
.tag-card.desc-tag:hover { border-color:#aaa; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.tag-label { font-size:15px; font-weight:700; }
.tag-desc { font-size:12px; color:#888; margin-top:4px; }
.tag-stats { display:flex; align-items:baseline; gap:8px; margin-top:8px; }
.tag-count { font-size:22px; font-weight:700; }
.tag-count.industry { color:#e74c3c; }
.tag-count.desc { color:#999; }
.tag-pct { font-size:13px; color:#888; }
.tag-bar { height:6px; background:#e8eef4; border-radius:3px; margin-top:6px; }
.tag-bar-fill { height:100%; border-radius:3px; }
.tag-companies { font-size:11px; color:#666; margin-top:6px; line-height:1.4; }
.tag-companies span { display:inline-block; background:#e8f0f8; padding:2px 6px; border-radius:4px; margin:2px; }

/* --- Word Frequency --- */
.freq-table { width:100%; border-collapse:collapse; }
.freq-table th { background:#2d6a9f; color:#fff; padding:8px 12px; font-size:13px; text-align:left; }
.freq-table td { padding:6px 12px; border-bottom:1px solid #eee; font-size:13px; }
.freq-table tr:hover { background:#f0f5fa; }
.freq-bar { display:inline-block; height:14px; background:linear-gradient(90deg,#2d6a9f,#4a90c4); border-radius:2px; vertical-align:middle; }
.freq-word { font-weight:600; color:#2d6a9f; }

/* --- Company Matrix --- */
.matrix-controls { margin-bottom:16px; display:flex; gap:12px; align-items:center; }
.matrix-controls label { font-size:13px; font-weight:600; }
.matrix-controls select { padding:6px 10px; border-radius:6px; border:1px solid #dde3ea; }
.matrix-search { padding:6px 12px; border-radius:6px; border:1px solid #dde3ea; width:200px; }
.matrix-wrapper { overflow-x:auto; max-height:600px; overflow-y:auto; border:1px solid #dde3ea; border-radius:8px; }
.matrix-table { width:100%; border-collapse:collapse; }
.matrix-table th { background:#2d6a9f; color:#fff; padding:6px 4px; font-size:11px; text-align:center; position:sticky; top:0; }
.matrix-table td { padding:4px; border:1px solid #eee; text-align:center; font-size:11px; }
.matrix-table .company-name { text-align:left; font-weight:600; white-space:nowrap; }
.matrix-cell { width:14px; height:14px; border-radius:3px; display:inline-block; }
.cell-on { }
.cell-off { background:#e8eef4; }

/* --- Company Detail --- */
.detail-panel { background:#fff; border-radius:8px; padding:20px; margin-top:16px; border:1px solid #dde3ea; }
.detail-name { font-size:18px; font-weight:700; color:#2d6a9f; }
.detail-biz { font-size:13px; color:#666; margin-top:8px; line-height:1.5; max-height:100px; overflow-y:auto; background:#f5f7fa; padding:8px 12px; border-radius:6px; }
.detail-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
.detail-tag { padding:4px 10px; border-radius:6px; font-size:13px; }
.detail-tag.cat-market { background:#ffe8e8; color:#c0392b; }
.detail-tag.cat-model { background:#e8ffe8; color:#27ae60; }
.detail-tag.cat-product { background:#f0f0f0; color:#888; }
.detail-tag.cat-strategy { background:#e8f0ff; color:#2d6a9f; }
.detail-tag.cat-chain { background:#f0f0f0; color:#888; }
.detail-tag.cat-desc { background:#f0f0f0; color:#888; border:1px solid #ddd; }

/* --- Chart --- */
.chart-container { background:#fff; border-radius:8px; padding:20px; border:1px solid #dde3ea; }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.bar-label { width:130px; font-size:13px; font-weight:600; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bar-value { width:50px; font-size:13px; font-weight:700; color:#e74c3c; text-align:right; }
.bar-track { flex:1; height:20px; background:#e8eef4; border-radius:4px; position:relative; }
.bar-fill { height:100%; border-radius:4px; transition:width .3s; }

/* --- Summary Stats --- */
.stats-row { display:flex; gap:16px; margin-bottom:20px; }
.stat-card { background:#fff; border-radius:8px; padding:16px 20px; border:1px solid #dde3ea; flex:1; }
.stat-value { font-size:28px; font-weight:700; color:#2d6a9f; }
.stat-label { font-size:13px; color:#888; margin-top:4px; }

.legend { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:12px; }
.legend-dot { width:12px; height:12px; border-radius:3px; }

/* --- Keyword Mapping --- */
.kw-section { background:#fff; border-radius:8px; padding:20px; border:1px solid #dde3ea; margin-bottom:16px; }
.kw-section-title { font-size:15px; font-weight:700; padding:8px 16px; color:#fff; border-radius:6px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.kw-section-title .kw-count { background:rgba(255,255,255,.3); padding:2px 8px; border-radius:4px; font-size:12px; }
.kw-tag-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:10px; padding:8px 12px; border-radius:6px; border:1px solid #eee; }
.kw-tag-row.desc-row { background:#f5f5f5; border-color:#ddd; }
.kw-tag-label { font-size:14px; font-weight:700; min-width:110px; padding-top:2px; }
.kw-tag-desc { font-size:12px; color:#888; margin-left:4px; }
.kw-tag-stats { font-size:12px; color:#888; margin-left:8px; white-space:nowrap; }
.kw-keywords { display:flex; flex-wrap:wrap; gap:4px; }
.kw-chip { padding:3px 8px; border-radius:4px; font-size:12px; cursor:default; }
.kw-chip.industry { background:#e8f0f8; color:#2d6a9f; border:1px solid #c4d8e8; }
.kw-chip.desc { background:#f0f0f0; color:#888; border:1px solid #ddd; }
.kw-divider { height:1px; background:#dde3ea; margin:8px 0; }
.kw-note { font-size:11px; color:#888; margin-top:12px; line-height:1.5; padding:8px 12px; background:#f5f7fa; border-radius:6px; }
</style>
</head>

// === Panel 1: Tag Overview ===
function renderOverview() {
    var container = document.getElementById('tag-overview');

        catGroups[t.category].push(t);
    });

    catOrder.forEach(function(cat) {
        var items = catGroups[cat] || [];

        html += '<div class="category-section">';
        if (isDesc) {
            html += '<div class="category-title" style="background:#bbb;color:#666">' + cat + '（' + items.length + '个标签 · 描述性）</div>';
        } else {
            html += '<div class="category-title" style="background:' + catColors[cat] + '">' + cat + '（' + items.length + '个标签 · 产业特征）</div>';
        }
        html += '<div class="tag-grid">';
        items.forEach(function(t) {

            var countClass = isDesc ? 'tag-count desc' : 'tag-count industry';
            html += '<div class="' + cardClass + '" onclick="highlightTag(\'' + t.label + '\')">';
            html += '<div class="tag-label" style="color:' + catColors[t.category] + '">' + t.label + '</div>';
            html += '<div class="tag-desc">' + t.desc + '</div>';

                html += '<span>' + c.name + '</span>';

function highlightTag(tagLabel) {
    document.querySelectorAll('.tag-card').forEach(function(c) { c.classList.remove('highlight'); });
    document.querySelectorAll('.tag-card').forEach(function(c) {
        if (c.querySelector('.tag-label').textContent === tagLabel) {
            c.classList.add('highlight');
        }
    });
}

// === Panel 2: Bar Chart ===
function renderChart() {

    var sorted = tags.slice().sort(function(a, b) { return b.count - a.count; });

    var html = '';
    sorted.forEach(function(t) {

// === Panel 3: Matrix ===
function renderMatrix(filterCat, searchText) {
    filterCat = filterCat || 'all';
    searchText = searchText || '';

    var filteredTags = filterCat === 'all' ? tags : tags.filter(function(t) { return t.category === filterCat; });
    var filteredCompanies = searchText
        ? companies.filter(function(c) { return c.name.indexOf(searchText) >= 0 || (c.code && c.code.indexOf(searchText) >= 0); })
        : companies;

    var wrapper = document.getElementById('matrix-wrapper');
    var html = '<table class="matrix-table"><thead><tr><th style="min-width:80px">企业</th>';
    filteredTags.forEach(function(t) {
        html += '<th title="' + t.desc + '" style="color:' + catColors[t.category] + '">' + t.label + '</th>';
    });
    html += '</tr></thead><tbody>';

    filteredCompanies.forEach(function(c) {
        var ctList = companyTags[c.name] || [];
        html += '<tr onclick="showCompanyDetail(\'' + c.name + '\')" style="cursor:pointer">';
        html += '<td class="company-name">' + c.name + '</td>';
        filteredTags.forEach(function(t) {
            var match = ctList.find(function(ct) { return ct.label === t.label; });
            if (match) {
                html += '<td><div class="matrix-cell cell-on" style="background:' + catColors[t.category] + '" title="' + match.keywords.join(', ') + '"></div></td>';
            } else {
                html += '<td><div class="matrix-cell cell-off"></div></td>';
            }
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    wrapper.innerHTML = html;
}

function filterMatrix() {
    var cat = document.getElementById('filter-category').value;
    var search = document.getElementById('matrix-search').value;
    renderMatrix(cat, search);
}

function showCompanyDetail(name) {
    var c = companies.find(function(x) { return x.name === name; });
    var ctList = companyTags[name] || [];
    var panel = document.getElementById('company-detail');
    panel.style.display = 'block';

    var html = '<div class="detail-name">' + c.name + ' (' + c.code + ')</div>';
    html += '<div style="font-size:12px;color:#888;margin-top:4px">' + c.wind_ind + ' | ' + c.hs_ind + '</div>';
    html += '<div class="detail-biz">' + c.main_biz + '</div>';
    html += '<div class="detail-tags">';
    ctList.forEach(function(ct) {
        html += '<div class="detail-tag ' + catClass[ct.category] + '">' + ct.label + ' <small>(' + ct.keywords.join(',') + ')</small></div>';
    });
    html += '</div>';
    panel.innerHTML = html;
}

            var matchedKws = matchedKwMap[d.label] || [];
            var rowClass = isDesc ? 'kw-tag-row desc-row' : 'kw-tag-row';
            var chipClass = isDesc ? 'kw-chip desc' : 'kw-chip industry';

            var tagObj = tags.find(function(t) { return t.label === d.label; });
            var countInfo = tagObj ? (tagObj.count + '家 / ' + tagObj.pct + '%') : '--';

            html += '<div class="' + rowClass + '">';
            html += '<div class="kw-tag-label" style="color:' + color + '">' + d.label + '</div>';
            html += '<div class="kw-tag-desc">' + d.desc + '</div>';
            html += '<div class="kw-tag-stats">(' + countInfo + ')</div>';
            html += '<div style="flex:1"></div>';
            html += '</div>';
            html += '<div class="kw-keywords" style="padding-left:12px;margin-bottom:10px">';
            d.keywords.forEach(function(kw) {
                var isMatched = matchedKws.indexOf(kw) >= 0;
                if (isMatched) {
                    html += '<span class="' + chipClass + '" style="font-weight:700">' + kw + '</span>';
                } else {
                    html += '<span class="' + chipClass + '" style="opacity:0.4;font-style:italic">' + kw + '</span>';
                }
            });
            html += '</div>';
        });

        html += '</div>';
    });

    container.innerHTML = html;
}

// === Init ===
renderOverview();
renderChart();
renderMatrix();
renderWordFreq();
renderKeywordMap();
</script>
